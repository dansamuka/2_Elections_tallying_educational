name: Ol Kalou Sentiment Refresh

on:
  workflow_dispatch:
    inputs:
      override_window:
        description: "Run even outside the observation window (for testing or post-election research)"
        type: boolean
        default: false
  schedule:
    # Every 15 minutes, offset from the top of the hour to reduce congestion (Section 9).
    # Tighten to */5 for the active election-day window if you want lower alert latency -
    # just add a second, narrower cron line scoped to election day.
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: sentiment-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install vaderSentiment --break-system-packages

      - name: Check observation window
        id: window
        run: |
          python3 - << 'EOF'
          import json, os, sys
          from datetime import datetime
          import zoneinfo

          cfg = json.load(open("sentiment/config/sentiment_config.json"))
          window = cfg["observation_window"]
          tz = zoneinfo.ZoneInfo(cfg["timezone"])
          now = datetime.now(tz)
          election_day = now.strftime("%Y-%m-%d") == cfg["election_date"]
          start_h, start_m = map(int, window["start_local"].split(":"))
          end_h, end_m = map(int, window["end_local"].split(":"))
          in_window = (now.hour, now.minute) >= (start_h, start_m) and (now.hour, now.minute) <= (end_h, end_m)

          override = os.environ.get("OVERRIDE_WINDOW") == "true"
          should_run = override or (election_day and in_window)
          print(f"election_day={election_day} in_window={in_window} override={override} -> should_run={should_run}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
          EOF
        env:
          OVERRIDE_WINDOW: ${{ github.event.inputs.override_window }}

      - name: Collect public X search
        if: steps.window.outputs.should_run == 'true'
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          cd sentiment/scripts
          CURSOR=$(python3 -c "import json,os; p='../../data/public/sentiment/latest.json'; print(json.load(open(p))['meta']['collection_cursor'] if os.path.exists(p) else '2026-07-16T00:00:00Z')")
          python3 collect_x_public.py --since "$CURSOR" || echo "X public collection failed - cursor will not advance for this source."

      - name: Collect authenticated home timeline (optional)
        if: steps.window.outputs.should_run == 'true'
        env:
          SENTIMENT_X_MODE: ${{ vars.SENTIMENT_X_MODE }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
        run: |
          cd sentiment/scripts
          CURSOR=$(python3 -c "import json,os; p='../../data/public/sentiment/latest.json'; print(json.load(open(p))['meta']['collection_cursor'] if os.path.exists(p) else '2026-07-16T00:00:00Z')")
          python3 collect_x_private.py --since "$CURSOR" || echo "Private timeline collection failed or skipped."

      - name: Collect news (GDELT)
        if: steps.window.outputs.should_run == 'true'
        run: |
          cd sentiment/scripts
          CURSOR=$(python3 -c "import json,os; p='../../data/public/sentiment/latest.json'; print(json.load(open(p))['meta']['collection_cursor'] if os.path.exists(p) else '2026-07-16T00:00:00Z')")
          python3 collect_news_gdelt.py --since "$CURSOR" || echo "News collection failed - cursor will not advance for this source."

      - name: Ingest manual notes
        if: steps.window.outputs.should_run == 'true'
        run: cd sentiment/scripts && python3 collect_manual_notes.py

      - name: Build public JSON
        if: steps.window.outputs.should_run == 'true'
        run: cd sentiment/scripts && python3 build_public_json.py --mode live

      - name: Push evidence trail to private repo (optional, for traceability)
        if: steps.window.outputs.should_run == 'true'
        env:
          EVIDENCE_REPO: ${{ vars.EVIDENCE_REPO }}
          EVIDENCE_REPO_TOKEN: ${{ secrets.EVIDENCE_REPO_TOKEN }}
        run: |
          if [ -z "$EVIDENCE_REPO" ] || [ -z "$EVIDENCE_REPO_TOKEN" ]; then
            echo "EVIDENCE_REPO / EVIDENCE_REPO_TOKEN not configured - skipping evidence trail push. Raw data for this run will simply be discarded below (safe default, no traceability)."
            exit 0
          fi
          AUDIT_DIR="sentiment/data/private/sentiment/audit"
          if [ -z "$(ls -A "$AUDIT_DIR" 2>/dev/null)" ]; then
            echo "No audit files produced this run - nothing to push."
            exit 0
          fi
          rm -rf /tmp/evidence_repo
          git clone --depth 1 "https://${EVIDENCE_REPO_TOKEN}@github.com/${EVIDENCE_REPO}.git" /tmp/evidence_repo
          mkdir -p /tmp/evidence_repo/runs
          cp "$AUDIT_DIR"/*.json /tmp/evidence_repo/runs/
          cd /tmp/evidence_repo
          git config user.name "sentiment-bot"
          git config user.email "actions@users.noreply.github.com"
          git add runs/
          git diff --quiet --cached || git commit -m "Evidence trail $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Clear private raw and audit layers
        if: steps.window.outputs.should_run == 'true'
        run: rm -f sentiment/data/private/sentiment/*_raw.jsonl sentiment/data/private/sentiment/audit/*.json

      - name: Commit public payload
        if: steps.window.outputs.should_run == 'true'
        run: |
          git config user.name "sentiment-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/public/sentiment/latest.json
          git diff --quiet --cached || git commit -m "Sentiment refresh $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
