name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e '.[dev,pdf]'
      - run: ruff check src tests scripts
      - run: pytest
      - run: python -m compileall -q src
      - run: python -m olkalou_engine.cli --root . archive-documents banissa-2025
      - run: python -m olkalou_engine.cli --root . archive-ocr banissa-2025 --engine embedded
      - run: python -m olkalou_engine.cli --root . archive-build banissa-2025
      - run: python -m olkalou_engine.cli --root . archive-provisional banissa-2025
      # Regression coverage for the 13 Jul 2026 sync-error fix: `publish` is
      # the ONLY thing that regenerates data/public/live.json (the file
      # frontend/index.html actually reads -- see SYNC_ERROR_DIAGNOSIS_NOTES.md).
      # It previously worked perfectly but was never invoked by anything on a
      # schedule, so it silently went stale for hours without any check
      # catching it. Make sure it at least always runs cleanly.
      - run: python -m olkalou_engine.cli --root . publish
      # Regression coverage for the OCR-extraction enhancement: the ROI
      # template builder must keep producing a structurally complete,
      # NOT-VERIFIED map (all 9 real candidates, sentinel coordinates), and
      # the calibration tool must keep producing a NEEDS_VISUAL_VERIFICATION
      # candidate file without ever touching the live ROI map.
      - run: python scripts/build_form35a_roi_template.py
      - run: python -c "import json; d=json.load(open('data/reference/form35a_roi.json')); assert d['status'] != 'VERIFIED', 'ROI template builder must never auto-verify'; assert len(d['fields']) == 26"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node --check frontend/app.js
      - run: node --check frontend/archive.js
      - run: node --check frontend/config.js
      # Execution tests for the archive.html review workbench (OCR prefill
      # display, editable draft inputs, CSV export) -- loads the real
      # frontend files into jsdom and drives them through actual DOM
      # interaction, not a syntax check. See tests/frontend/README.md.
      - run: cd tests/frontend && npm install && npm test
