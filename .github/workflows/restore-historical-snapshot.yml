name: Restore Banissa and Malava archive

on:
  workflow_dispatch:
    inputs:
      snapshot_sha:
        description: "Known-good historical sync commit"
        required: true
        default: "b81eab0841661e5dc3deb86396b966181eac019a"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: historical-forms-sync
  cancel-in-progress: false

jobs:
  restore:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore last known-good source forms and OCR outputs
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          snapshot="${{ inputs.snapshot_sha }}"
          git cat-file -e "$snapshot^{commit}"
          git checkout "$snapshot" -- \
            data/elections/banissa-2025 \
            data/elections/malava-2025 \
            data/public/elections/banissa-2025.json \
            data/public/elections/malava-2025.json \
            data/public/elections/banissa-2025 \
            data/public/elections/malava-2025

      - name: Install application
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[historical-ocr,pdf]'

      - name: Reconstruct Malava ward and polling-centre hierarchy
        run: |
          python -m olkalou_engine.cli --root . archive-remap malava-2025
          # Cached extraction files are reused; this refreshes the review CSV
          # with the remapped official-style stream keys without rerunning OCR.
          python -m olkalou_engine.cli --root . archive-ocr malava-2025 --engine embedded
          python -m olkalou_engine.cli --root . archive-build malava-2025
          python -m olkalou_engine.cli --root . archive-build banissa-2025

      - name: Publish restored elections without touching Ol Kalou
        id: commit
        shell: bash
        run: |
          bash scripts/publish_regenerated_outputs.sh \
            data/elections/banissa-2025 \
            data/elections/malava-2025 \
            data/public/elections/banissa-2025.json \
            data/public/elections/malava-2025.json \
            data/public/elections/banissa-2025 \
            data/public/elections/malava-2025 \
            data/public/elections/catalog.json

      - name: Assemble updated Pages site
        run: |
          mkdir -p _site/data/public
          cp -R frontend/. _site/
          cp -R data/public/. _site/data/public/
          sed -i 's#../data/public/#./data/public/#g' _site/config.js
          find _site/data/public -type f -name '*.json' -exec sed -i 's#../data/public/#./data/public/#g' {} +
          python scripts/validate_archive_form_links.py --site-root _site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy restored archive
        id: deployment
        uses: actions/deploy-pages@v4
