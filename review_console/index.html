<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ol Kalou Form Review Console</title>
  <style>
    :root{--g:#0e1116;--s:#171c24;--r:#2a323d;--i:#e8eaed;--d:#98a2b0;--ok:#3fa76b;--warn:#d9873a;--bad:#d9534f;--blue:#5c8fc7}*{box-sizing:border-box}body{margin:0;background:var(--g);color:var(--i);font-family:system-ui,sans-serif}button,input,textarea{font:inherit}.top{height:58px;border-bottom:1px solid var(--r);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--s)}.top h1{font-size:1rem;margin:0}.identity{display:flex;gap:8px;align-items:center}.identity input{background:var(--g);border:1px solid var(--r);color:var(--i);padding:7px}.shell{display:grid;grid-template-columns:260px minmax(0,1.25fr) minmax(360px,.75fr);height:calc(100vh - 58px)}.queue{border-right:1px solid var(--r);overflow:auto;background:var(--s)}.queue h2,.entry h2{font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;color:var(--d);padding:12px;margin:0;border-bottom:1px solid var(--r)}.queue button{width:100%;text-align:left;border:0;border-bottom:1px solid var(--r);background:transparent;color:var(--i);padding:12px;cursor:pointer}.queue button:hover,.queue button.active{background:#222b38}.queue small{display:block;color:var(--d);margin-top:4px}.scan{min-width:0;display:grid;place-items:stretch;background:#080a0d}.scan iframe,.scan img{width:100%;height:100%;object-fit:contain;border:0;background:white}.empty{display:grid;place-items:center;color:var(--d)}.entry{overflow:auto;background:var(--s);border-left:1px solid var(--r)}.form{padding:14px}.meta{display:grid;gap:4px;padding:12px 14px;border-bottom:1px solid var(--r);font-family:ui-monospace,monospace}.meta small{color:var(--d)}.field{display:grid;grid-template-columns:minmax(0,1fr) 115px;align-items:center;gap:10px;margin:7px 0}.field label{font-size:.86rem}.field input{width:100%;background:var(--g);border:1px solid var(--r);color:var(--i);padding:9px;text-align:right;font-family:ui-monospace,monospace;font-size:1rem}.field input:focus{outline:2px solid var(--blue)}.totals{margin:14px 0;border-top:1px solid var(--r);padding-top:10px}.sum{display:flex;justify-content:space-between;padding:8px 0;font-family:ui-monospace,monospace}.checks{display:flex;gap:6px;flex-wrap:wrap}.check{font:700 .68rem ui-monospace,monospace;padding:4px 6px;border:1px solid var(--r)}.pass{color:#8bdbaa;border-color:#34714b}.fail{color:#ff9f9b;border-color:#843e3e}.actions{position:sticky;bottom:0;background:linear-gradient(transparent,var(--s) 20%);padding:24px 14px 14px;display:grid;grid-template-columns:1fr auto;gap:8px}.actions button{padding:11px 14px;border:1px solid var(--r);cursor:pointer}.confirm{background:var(--ok);color:#07130c;font-weight:800}.reject{background:transparent;color:#ffaaa7}.status{padding:10px 14px;border-top:1px solid var(--r);font-size:.82rem;color:var(--d)}.warning{color:#ffd09b}.error{color:#ffaaa7}@media(max-width:980px){.shell{grid-template-columns:210px 1fr}.entry{position:fixed;right:0;top:58px;bottom:0;width:min(420px,92vw);box-shadow:-20px 0 50px #000}.scan{min-width:0}}@media(max-width:620px){.shell{grid-template-columns:1fr}.queue{display:none}.entry{width:100%}.top{gap:8px}.top h1{font-size:.82rem}.identity input{width:130px}}
    .prov-toggle{background:repeating-linear-gradient(45deg,#3a2308,#3a2308 8px,#2a1a06 8px,#2a1a06 16px);color:#ffcf8a;border:1px solid var(--warn);padding:8px 12px;font-weight:800;font-size:.72rem;letter-spacing:.04em;cursor:pointer;border-radius:3px}
    .prov-toggle:hover{filter:brightness(1.15)}
    .prov-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;align-items:flex-start;justify-content:center;padding:5vh 16px}
    .prov-backdrop.open{display:flex}
    .prov-modal{background:var(--s);border:2px solid var(--bad);border-radius:6px;max-width:720px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 20px 60px #000}
    .prov-banner{background:repeating-linear-gradient(45deg,#3a1108,#3a1108 10px,#2a0d06 10px,#2a0d06 20px);color:#ffc1b8;padding:16px;font-weight:800;font-size:.82rem;line-height:1.5;border-bottom:2px solid var(--bad)}
    .prov-body{padding:16px}
    .prov-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--r);font-family:ui-monospace,monospace}
    .prov-row .n{color:var(--d);font-size:.82rem}
    .prov-meta{color:var(--d);font-size:.78rem;margin:10px 0;font-family:ui-monospace,monospace}
    .prov-close{float:right;background:transparent;border:1px solid var(--r);color:var(--i);padding:6px 10px;cursor:pointer;margin:12px 16px 0 0}
    .review-tally{background:#141C17;border-bottom:1px solid #2E5B40;border-left:3px solid var(--ok);padding:8px 16px;font-size:.8rem;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
    .review-tally strong{font-family:ui-monospace,monospace;font-variant-numeric:tabular-nums;color:var(--ok)}
    .review-tally .rt-cand{color:var(--d)}
    .review-tally .rt-note{color:var(--d);font-size:.7rem;margin-left:auto}
  </style>
</head>
<body>
<header class="top"><h1>OL KALOU · DOUBLE-ENTRY FORM REVIEW</h1><div class="identity"><button id="provisionalToggle" class="prov-toggle" type="button" title="Internal QA tool. Never published.">⚠ OL KALOU PROVISIONAL (QA)</button><button id="provisionalToggleBanissa" class="prov-toggle" type="button" title="Internal QA tool. Never published.">⚠ BANISSA PROVISIONAL (QA)</button><label for="reviewer">Reviewer</label><input id="reviewer" autocomplete="off" placeholder="reviewer-id"><input id="token" type="password" placeholder="API token"></div></header>
<div id="reviewTally" class="review-tally" hidden></div>
<main class="shell">
  <aside class="queue"><h2>Review queue · <span id="queueCount">0</span></h2><div id="queue"></div></aside>
  <section class="scan"><div id="scan" class="empty">Select a form from the queue.</div></section>
  <aside class="entry"><h2>Independent entry</h2><div id="meta" class="meta"><span>No form selected</span></div><form id="form" class="form"><div id="candidateFields"></div><div class="totals"><div class="field"><label for="registered">Registered on form</label><input id="registered" type="number" min="0" required></div><div class="field"><label for="rejected">Rejected ballots</label><input id="rejected" type="number" min="0" required></div><div class="field"><label for="poValid">PO stated valid</label><input id="poValid" type="number" min="0" required></div><div class="field"><label for="poCast">PO stated total cast</label><input id="poCast" type="number" min="0" required></div><div class="sum"><span>Candidate sum</span><strong id="candidateSum">0</strong></div><div class="sum"><span>Computed cast</span><strong id="computedCast">0</strong></div><div id="checks" class="checks"></div></div><label>Reviewer notes<textarea id="notes" rows="3" style="width:100%;background:var(--g);border:1px solid var(--r);color:var(--i);padding:8px"></textarea></label></form><div class="status" id="status">Keyboard: Tab through fields, Enter submits when focus is in the final field.</div><div class="actions"><button id="reject" class="reject" type="button">R · flag/reject</button><button id="confirm" class="confirm" type="button">ENTER · CONFIRM ENTRY</button></div></aside>
</main>
<div id="provBackdrop" class="prov-backdrop">
  <div class="prov-modal">
    <button class="prov-close" id="provClose" type="button">✕ close</button>
    <div class="prov-banner" id="provBanner">Loading…</div>
    <div class="prov-body" id="provBody"></div>
  </div>
</div>
<script>
(() => {
  let reference=null, selected=null, queue=[];
  const $=id=>document.getElementById(id);
  const auth=()=>{const token=$("token").value.trim();return token?{"Authorization":`Bearer ${token}`}:{}};
  $("reviewer").value=localStorage.getItem("olkalou.reviewer")||""; $("token").value=sessionStorage.getItem("olkalou.token")||"";
  $("reviewer").addEventListener("input",()=>localStorage.setItem("olkalou.reviewer",$("reviewer").value)); $("token").addEventListener("input",()=>sessionStorage.setItem("olkalou.token",$("token").value));
  async function api(path, options={}){const res=await fetch(path,{...options,headers:{"Content-Type":"application/json",...auth(),...(options.headers||{})}});if(!res.ok)throw new Error((await res.json().catch(()=>({detail:res.statusText}))).detail||res.statusText);return res.json()}
  async function init(){try{reference=await api('/api/reference');renderFields();await loadQueue();await refreshTally()}catch(e){setStatus(e.message,'error')}}
  async function refreshTally(){try{const p=await api('/api/provisional');const published=p.state_breakdown.PUBLISHED||0;const cands=p.candidates.map(c=>`<span class="rt-cand">${c.party} ${c.votes.toLocaleString()}</span>`).join(' · ');$("reviewTally").hidden=false;$("reviewTally").innerHTML=`<span><strong>${published} / ${p.forms_total}</strong> streams confirmed</span>${cands}<span class="rt-note">Candidate figures include every extraction, published or still under review -- see ⚠ PROVISIONAL for the full breakdown. Not an official result.</span>`}catch(e){$("reviewTally").hidden=true}}
  async function openProvisional(path, kind){$("provBackdrop").classList.add('open');$("provBanner").textContent='Loading…';$("provBody").innerHTML='';try{const p=await api(path);$("provBanner").textContent=p.warning;let extra='';if(kind==='historical'){extra=`<div class="prov-meta">${p.streams_contributing} of ${p.streams_total} streams have ANY figure so far (verified takes precedence over OCR-only). Sources: VERIFIED ${p.source_breakdown.VERIFIED} · OCR_ONLY ${p.source_breakdown.OCR_ONLY}.</div>`;if(p.official_declaration_for_reference){extra+=`<div class="prov-meta">Certified Gazette declaration (reference only, not derived from the sum below): ${Object.entries(p.official_declaration_for_reference.candidate_totals).map(([k,v])=>`${k} ${Number(v).toLocaleString()}`).join(' · ')}</div>`}}else{extra=`<div class="prov-meta">${p.forms_contributing} of ${p.forms_total} forms have ANY OCR reading so far (includes unreviewed/failed-check forms). States included: ${p.included_states.join(', ')||'none yet'}.</div>`}const streamList=(p.contributing_streams||[]).map(s=>`${s.stream_key}[${s.state||s.source}]`).join(', ')||'—';$("provBody").innerHTML=extra+p.candidates.map(c=>`<div class="prov-row"><span>${c.name} <span class="n">(${c.party})</span></span><strong>${c.votes.toLocaleString()}</strong></div>`).join('')+`<div class="prov-meta">Per-stream detail (${(p.contributing_streams||[]).length}): ${streamList}</div>`}catch(e){$("provBanner").textContent='Could not load (auth token set?): '+e.message}}
  $("provisionalToggle").addEventListener('click',()=>openProvisional('/api/provisional','live'));
  $("provisionalToggleBanissa").addEventListener('click',()=>openProvisional('/api/historical-provisional/banissa-2025','historical'));
  $("provClose").addEventListener('click',()=>$("provBackdrop").classList.remove('open'));
  $("provBackdrop").addEventListener('click',(e)=>{if(e.target.id==='provBackdrop')$("provBackdrop").classList.remove('open')});
  function renderFields(){const root=$("candidateFields");root.innerHTML=reference.candidates.candidates.sort((a,b)=>(a.ballot_no||99)-(b.ballot_no||99)).map(c=>`<div class="field"><label for="vote-${c.id}">${c.ballot_no||'—'} · ${c.name} <small>(${c.abbr})</small></label><input id="vote-${c.id}" data-candidate="${c.id}" type="number" min="0" required></div>`).join('');document.querySelectorAll('input[type=number]').forEach(i=>i.addEventListener('input',updateMath));}
  async function loadQueue(){const data=await api('/api/review/queue');queue=data.items;$("queueCount").textContent=data.count;$("queue").innerHTML=queue.map(item=>`<button data-key="${item.stream_key}" data-version="${item.version}"><strong>${item.stream_key}</strong><small>${item.state} · v${item.version} · ${item.review_count} entries</small></button>`).join('')||'<div class="empty" style="padding:20px">Queue clear.</div>';document.querySelectorAll('.queue button').forEach(b=>b.addEventListener('click',()=>selectForm(b.dataset.key,Number(b.dataset.version))));}
  async function selectForm(key,version){selected=await api(`/api/review/${encodeURIComponent(key)}/${version}`);document.querySelectorAll('.queue button').forEach(b=>b.classList.toggle('active',b.dataset.key===key&&Number(b.dataset.version)===version));const s=selected.stream||{};$("meta").innerHTML=`<strong>${key} · v${version}</strong><span>${s.station_name||'Unmatched station'}</span><small>${s.ward_name||''} · certified register ${s.registered??'UNRESOLVED'} · ${selected.reviews.length} prior independent entries</small>`;const url=selected.form.form_url;if(url){$("scan").className='';$("scan").innerHTML=url.toLowerCase().includes('.pdf')?`<iframe src="${url}#toolbar=1&navpanes=0" title="Form 35A"></iframe>`:`<img src="${url}" alt="Form 35A scan">`}else{$("scan").className='empty';$("scan").textContent='Archived form URL unavailable.'}prefill(selected.prefill);updateMath();const first=document.querySelector('[data-candidate]');if(first)first.focus();}
  function prefill(data){document.querySelectorAll('[data-candidate]').forEach(input=>input.value=data?.votes?.[input.dataset.candidate]??'');$("registered").value=data?.registered_form??selected?.stream?.registered??'';$("rejected").value=data?.rejected??'';$("poValid").value=data?.po_total_valid??'';$("poCast").value=data?.total_cast_form??'';$("notes").value='';}
  function int(id){const v=$(id).value;return v===''?null:Number(v)}function votes(){return Object.fromEntries([...document.querySelectorAll('[data-candidate]')].map(i=>[i.dataset.candidate,Number(i.value||0)]))}
  function updateMath(){const v=votes(),sum=Object.values(v).reduce((a,b)=>a+b,0),rej=int('rejected')||0,reg=int('registered'),poV=int('poValid'),poC=int('poCast');$("candidateSum").textContent=sum.toLocaleString();$("computedCast").textContent=(sum+rej).toLocaleString();const checks=[['V01',poV==null?null:sum===poV],['V02',poC==null?null:sum+rej===poC],['V03',reg==null?null:sum+rej<=reg],['V07',selected?.stream?.registered==null||reg==null?null:reg===selected.stream.registered]];$("checks").innerHTML=checks.map(([c,p])=>`<span class="check ${p===true?'pass':p===false?'fail':''}">${c} ${p===true?'PASS':p===false?'FAIL':'—'}</span>`).join('');}
  async function submit(){if(!selected)return setStatus('Select a form first.','warning');const reviewer=$("reviewer").value.trim();if(!reviewer)return setStatus('Enter a reviewer ID.','warning');const required=[...document.querySelectorAll('[data-candidate]'),$('registered'),$('rejected'),$('poValid'),$('poCast')];const missing=required.some(i=>i.value==='');if(missing)return setStatus('Complete every candidate field and all control totals.','warning');const body={reviewer_id:reviewer,votes:votes(),rejected:int('rejected'),registered_form:int('registered'),po_total_valid:int('poValid'),total_cast_form:int('poCast'),notes:$("notes").value.trim()||null};try{const out=await api(`/api/review/${encodeURIComponent(selected.form.stream_key)}/${selected.form.version}`,{method:'POST',body:JSON.stringify(body)});setStatus(out.message,out.status==='MISMATCH'?'error':'');await loadQueue();await refreshTally();if(out.status==='PUBLISHED'){$("scan").innerHTML='<div class="empty">Published as human-verified.</div>';selected=null}}catch(e){setStatus(e.message,'error')}}
  function setStatus(message,cls=''){$("status").className=`status ${cls}`;$("status").textContent=message}
  $("confirm").addEventListener('click',submit);$("reject").addEventListener('click',()=>setStatus('Flag recorded locally: use reviewer notes and submit the observed values; mismatches route to adjudication.','warning'));document.addEventListener('keydown',e=>{if(e.key==='r'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){$("reject").click()}if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();submit()}});init();
})();
</script>
</body></html>
